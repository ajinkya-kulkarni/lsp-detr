# @package _global_

mode: fit
checkpoint: null
seed: 42

trainer:
  max_epochs: 5
  log_every_n_steps: 1
  accumulate_grad_batches: 4
  enable_progress_bar: false

model:
  num_classes: 1

data:
  _target_: lsp_detr.data.nufuse.NuFuse
  root: NuFuse/merged_split/NuFuse-Train256
  batch_size: 2
  num_workers: 0
  max_samples: 4
  train_transforms:
    - _target_: albumentations.Normalize
  eval_transforms:
    - _target_: albumentations.Normalize

metadata:
  run_name: NuFuse smoke test (deterministic, no augmentations)
  description: NuFuse smoke test with augmentations disabled and seed=42 for deterministic reference runs
